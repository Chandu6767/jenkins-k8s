deploymentMode: SingleBinary

singleBinary:
  replicas: 1

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

chunksCache:
  enabled: false

resultsCache:
 enabled: true

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem

  storage_config:
    filesystem:
      directory: /var/loki/chunks

  compactor:
    working_directory: /var/loki/compactor

  limits_config:
    allow_structured_metadata: false

gateway:
  enabled: false

monitoring:
  dashboards:
    enabled: false

  serviceMonitor:
    enabled: false

  selfMonitoring:
    enabled: false

test:
  enabled: false
